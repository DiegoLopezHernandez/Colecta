name: Build Android APK

# Compila la app y publica el APK como Release.
# Se dispara con cada push a main y manualmente desde la pestaña Actions.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Debug APK
        # Sin Gradle Wrapper en el repo: el action `setup-gradle` nos provee
        # `gradle` directamente. Usamos assembleDebug porque viene firmado con el
        # debug.keystore que Gradle genera automáticamente — no requiere secrets.
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: |
          mkdir -p out
          cp app/build/outputs/apk/debug/*.apk out/Colecta-${{ github.run_number }}.apk
          ls -la out/

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Colecta-apk-${{ github.run_number }}
          path: out/*.apk
          retention-days: 30

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build ${{ github.run_number }}
          body: |
            APK Debug generado automáticamente desde el commit ${{ github.sha }}.
            Descarga e instala en tu Android.
          files: out/*.apk
          draft: false
          prerelease: false
